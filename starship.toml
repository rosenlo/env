format = """
[$directory]($style)\
$git_branch\
$git_status\
$time ➜ """

[directory]
style = "bold green"
truncation_length = 0
truncate_to_repo = false
home_symbol = "~"

[git_branch]
style = "bold blue"

[git_status]
style = "bold blue"

[time]
disabled = false
time_format = "%H:%M"
format = " [$time]($style)"
style = "dim white"
